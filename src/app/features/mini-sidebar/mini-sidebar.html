<div class="layout-wrapper">

  <aside class="sidebar">

    <div class="sidebar-header">
      <span class="logo">
        <iconify-icon icon="tabler:bed"></iconify-icon> 
        <span class="nav-text">Reservation</span>
      </span>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        
        <li>
          <a routerLink="/public-dashboard"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}"
             class="nav-link">
            <iconify-icon icon="tabler:home"></iconify-icon>
            <span>Kezdőlap</span>
          </a>
        </li>

        <li class="nav-spacer"></li>

        <li>
          <a routerLink="/auth/login"
             routerLinkActive="active"
             class="nav-link login-link">
            <iconify-icon icon="tabler:login"></iconify-icon>
            <span>Belépés</span>
          </a>
        </li>

        <li>
          <a routerLink="/auth/register"
             routerLinkActive="active"
             class="nav-link register-link">
            <iconify-icon icon="tabler:user-plus"></iconify-icon>
            <span>Regisztráció</span>
          </a>
        </li>

      </ul>
    </nav>
  </aside>

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
