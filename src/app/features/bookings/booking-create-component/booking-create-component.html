<div class="admin-create-container">
  <div class="admin-create-card">

    <h1 class="admin-title">Új foglalás létrehozása</h1>

    @if (success) {
      <div class="alert-box success">
        <iconify-icon icon="tabler:circle-check"></iconify-icon> Sikeres foglalás!
      </div>
    }
    @if (error) {
      <div class="alert-box error">
        <iconify-icon icon="tabler:alert-circle"></iconify-icon> {{ error }}
      </div>
    }

    <div class="form-content">
      <div class="form-group">
        <label>Ingatlan ID</label>
        <input type="number" [(ngModel)]="model.propertyId" class="form-input" placeholder="Pl. 1">
      </div>

      <div class="form-group">
        <label>Vendég ID</label>
        <input type="number" [(ngModel)]="model.guestId" class="form-input" placeholder="Pl. 42">
      </div>

      <div class="date-picker-grid">
        <div class="form-group">
          <label>Kezdő dátum</label>
          <input type="date" [(ngModel)]="model.startDate" class="form-input">
        </div>

        <div class="form-group">
          <label>Záró dátum</label>
          <input type="date" [(ngModel)]="model.endDate" class="form-input">
        </div>
      </div>

      <button class="btn-primary" (click)="create()">
        Foglalás rögzítése
      </button>
    </div>

  </div>
</div>
