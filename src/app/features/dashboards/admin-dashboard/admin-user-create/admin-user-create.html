<div class="admin-form-container">
  
  <header class="form-header">
    <div class="header-left">
      <button (click)="cancel()" class="btn-back" title="Vissza">
        <iconify-icon icon="tabler:arrow-left"></iconify-icon>
      </button>
      <div class="header-icon-box">
        <iconify-icon icon="tabler:user-plus"></iconify-icon>
      </div>
      <div class="header-titles">
        <h2>Új felhasználó felvétele</h2>
        <p>Hozz létre egy új fiókot és oszd ki a jogosultságokat.</p>
      </div>
    </div>
  </header>

  @if (error) {
    <div class="alert-box error">
      <iconify-icon icon="tabler:alert-circle"></iconify-icon>
      <span>{{ error }}</span>
    </div>
  }
  @if (successMessage) {
    <div class="alert-box success">
      <iconify-icon icon="tabler:check"></iconify-icon>
      <div class="alert-content">
        <span class="font-bold">{{ successMessage }}</span>
        <span class="redirect-text">Átirányítás...</span>
      </div>
    </div>
  }

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="user-form">
      
      <div class="form-grid">
        <div class="form-group">
          <label>Felhasználónév *</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              name="username" 
              [(ngModel)]="userData.username" 
              required
              class="form-input"
              placeholder="pl. admin_pista">
          </div>
        </div>

        <div class="form-group">
          <label>E-mail cím *</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              name="email" 
              [(ngModel)]="userData.email" 
              required
              class="form-input"
              placeholder="pl. pista@példa.hu">
          </div>
        </div>

        <div class="form-group">
          <label>Jelszó *</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              name="password" 
              [(ngModel)]="userData.password" 
              required
              class="form-input"
              placeholder="Ideiglenes jelszó">
          </div>
        </div>

        <div class="form-group">
          <label>Szerepkör *</label>
          <select 
            name="role" 
            [(ngModel)]="userData.role"
            class="form-select">
            <option value="Guest">Guest (Sima felhasználó)</option>
            <option value="Host">Host (Házigazda)</option>
            <option value="Admin">Admin (Rendszergazda)</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" (click)="cancel()" class="btn-ghost">
          Mégsem
        </button>
        <button type="submit" [disabled]="loading" class="btn-primary-confirm">
          @if (loading) {
            <iconify-icon icon="line-md:loading-loop"></iconify-icon>
            Mentés...
          } @else {
            <iconify-icon icon="tabler:device-floppy"></iconify-icon>
            Felhasználó létrehozása
          }
        </button>
      </div>

    </form>
  </div>
</div>
