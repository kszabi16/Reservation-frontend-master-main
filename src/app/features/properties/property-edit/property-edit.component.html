<div class="edit-property-wrapper">

  <header class="page-header">
    <div class="header-icon">
      <iconify-icon icon="tabler:edit"></iconify-icon>
    </div>
    <div class="header-text">
      <h2 class="page-title">Ingatlan szerkesztése</h2>
      <p class="page-subtitle">Módosítsd a hirdetésed adatait a naprakész információkért.</p>
    </div>
  </header>

  <div class="card form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="property-form">
      
      <div class="form-group">
        <label>Ingatlan címe</label>
        <input formControlName="Title" placeholder="Pl. Balatoni panorámás nyaraló" class="form-input" />
      </div>

      <div class="form-group">
        <label>Leírás</label>
        <textarea formControlName="Description" placeholder="Írjon részletes leírást az ingatlanról..." class="form-input textarea"></textarea>
      </div>

      <div class="form-group">
        <label>Helyszín</label>
        <div class="input-with-icon">
          <iconify-icon icon="tabler:map-pin"></iconify-icon>
          <input formControlName="Location" placeholder="Város, utca..." class="form-input" />
        </div>
      </div>

      <div class="form-grid-row">
        <div class="form-group">
          <label>Ár / Éjszaka (HUF)</label>
          <div class="input-with-icon">
            <iconify-icon icon="tabler:coin-euro"></iconify-icon>
            <input type="number" formControlName="PricePerNight" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label>Férőhely (fő)</label>
          <div class="input-with-icon">
            <iconify-icon icon="tabler:users"></iconify-icon>
            <input type="number" formControlName="Capacity" class="form-input" />
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="form.invalid || loading" class="btn-primary submit-btn">
          @if (loading) {
            <iconify-icon icon="line-md:loading-loop"></iconify-icon>
            <span>Mentés folyamatban...</span>
          } @else {
            <iconify-icon icon="tabler:device-floppy"></iconify-icon>
            <span>Módosítások mentése</span>
          }
        </button>
      </div>

    </form>
  </div>

  @if (error) {
    <div class="alert-box error">
      <iconify-icon icon="tabler:alert-triangle"></iconify-icon> 
      <span>{{ error }}</span>
    </div>
  }

</div>
